<section class="section">
    <h2>Contact / Enquiry</h2>
    <form class="contact-form" onsubmit="sendWhatsApp(event)">
        <input type="text" id="name" placeholder="Your Name" required>
        <input type="email" id="email" placeholder="Your Email" required>
        <input type="tel" id="phone" placeholder="Phone Number" required>
        <textarea id="message" rows="5" placeholder="Your Message / Enquiry" required></textarea>
        <button type="submit">Submit</button>
    </form>
</section>

<script>
function sendWhatsApp(e) {
    e.preventDefault(); // Prevent form from submitting normally
    
    const name = document.getElementById('name').value;
    const email = document.getElementById('email').value;
    const phone = document.getElementById('phone').value;
    const message = document.getElementById('message').value;

    // Your WhatsApp number (replace with your number, include country code, no +)
    const adminNumber = '919674218151'; 

    const text = `New Enquiry from Goa Tourism Website:\nName: ${name}\nEmail: ${email}\nPhone: ${phone}\nMessage: ${message}`;

    // Open WhatsApp Web or App
    const url = `https://wa.me/${adminNumber}?text=${encodeURIComponent(text)}`;
    window.open(url, '_blank');
}
</script>
