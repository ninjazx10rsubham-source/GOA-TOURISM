<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Goa Tourism</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:#f4f7fb;
}

/* Navbar */

header{
background:linear-gradient(90deg,#ff7e5f,#feb47b);
padding:15px 40px;
display:flex;
justify-content:space-between;
align-items:center;
color:white;
}

nav a{
color:white;
text-decoration:none;
margin-left:25px;
font-weight:bold;
transition:0.3s;
}

nav a:hover{
color:black;
transform:scale(1.1);
}

/* Hero Section */

.hero{
height:90vh;
background:url("tourism.jpg") center/cover no-repeat;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
color:white;
}

.hero-text{
background:rgba(0,0,0,0.5);
padding:30px;
border-radius:10px;
animation:fadeIn 2s;
}

.hero h1{
font-size:55px;
margin-bottom:10px;
}

.hero p{
font-size:20px;
margin-bottom:20px;
}

.hero button{
padding:12px 25px;
border:none;
border-radius:25px;
background:#ff7e5f;
color:white;
font-size:18px;
cursor:pointer;
transition:0.3s;
}

.hero button:hover{
background:#ff5722;
transform:scale(1.1);
}

/* Animation */

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(40px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* Footer */

footer{
background:#222;
color:white;
text-align:center;
padding:15px;
}

</style>
</head>

<body>

<header>
<h2>Goa Tourism</h2>

<nav>
<a href="#">Home</a>
<a href="#">Beaches</a>
<a href="#">Activities</a>
<a href="#">Hotels</a>
<a href="#">Contact</a>
</nav>
</header>

<section class="hero">
<div class="hero-text">
<h1>Welcome to Goa</h1>
<p>Enjoy Beaches, Adventure & Tourism</p>
<button>Explore Now</button>
</div>
</section>

<footer>
<p>© 2026 Goa Tourism | Discover Paradise</p>
</footer>

</body>
</html>
