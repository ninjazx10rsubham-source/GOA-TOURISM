<!-- Add this before the footer in your existing index.html -->

<!-- Tour Packages Section -->
<section id="packages" class="section">
    <h2>Tour Packages</h2>
    <div class="gallery">
        <div class="card">
            <img src="image/beach1.jpg" alt="Package 1">
            <p>Goa Beach Explorer</p>
            <p>3 Days / 2 Nights</p>
            <p>Price: ₹12,000</p>
        </div>
        <div class="card">
            <img src="image/dudhsagarfalls1.jpg" alt="Package 2">
            <p>Waterfall Adventure</p>
            <p>4 Days / 3 Nights</p>
            <p>Price: ₹18,000</p>
        </div>
        <div class="card">
            <img src="image/fort1.jpg" alt="Package 3">
            <p>Heritage & Fort Tour</p>
            <p>2 Days / 1 Night</p>
            <p>Price: ₹8,500</p>
        </div>
    </div>
</section>

<!-- Contact / Enquiry Section -->
<section id="contact" class="section">
    <h2>Contact / Enquiry</h2>
    <form class="contact-form" action="#" method="post">
        <input type="text" name="name" placeholder="Your Name" required>
        <input type="email" name="email" placeholder="Your Email" required>
        <input type="tel" name="phone" placeholder="Phone Number" required>
        <textarea name="message" rows="5" placeholder="Your Message / Enquiry" required></textarea>
        <button type="submit">Submit</button>
    </form>
</section>
